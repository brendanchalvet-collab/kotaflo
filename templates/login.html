<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Kotaflo</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>

<!-- ===== PAGE LOGIN ===== -->
<div class="login-page">
    <div class="login-box">

        <!-- Logo -->
        <div class="login-box__logo">
            <h1>⚡ Kotaflo</h1>
            <p>Gérez votre activité simplement</p>
        </div>

        <!-- Onglets login / register -->
        <div style="display:flex; gap:.5rem; margin-bottom:1.5rem;">
            <button class="btn btn--primary" id="tab-login" style="flex:1" onclick="showTab('login')">Connexion</button>
            <button class="btn btn--ghost"   id="tab-register" style="flex:1" onclick="showTab('register')">Créer un compte</button>
        </div>

        <!-- ===== FORMULAIRE CONNEXION ===== -->
        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div id="login-error" class="text-danger mt-2 hidden"></div>
            <button type="submit" class="btn btn--primary" style="width:100%; margin-top:.5rem" id="btn-login">
                Se connecter
            </button>
        </form>

        <!-- ===== FORMULAIRE INSCRIPTION ===== -->
        <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="vous@exemple.fr" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" placeholder="Min. 8 caractères" required minlength="8">
            </div>
            <div id="register-error" class="text-danger mt-2 hidden"></div>
            <button type="submit" class="btn btn--primary" style="width:100%; margin-top:.5rem" id="btn-register">
                Créer mon compte
            </button>
        </form>

    </div>
</div>

<script>
    // ===== ONGLETS =====
    function showTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('form-login').classList.toggle('hidden', !isLogin);
        document.getElementById('form-register').classList.toggle('hidden', isLogin);
        document.getElementById('tab-login').className    = isLogin ? 'btn btn--primary' : 'btn btn--ghost';
        document.getElementById('tab-register').className = isLogin ? 'btn btn--ghost'   : 'btn btn--primary';
    }

    // ===== CONNEXION =====
    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('login-error');
        btn.disabled = true;
        btn.textContent = 'Connexion…';
        err.classList.add('hidden');

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email:    document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            })
        });

        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            window.location.href = '/dashboard';
        } else {
            err.textContent = data.error || 'Erreur de connexion';
            err.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Se connecter';
        }
    }

    // ===== INSCRIPTION =====
    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-register');
        const err = document.getElementById('register-error');
        btn.disabled = true;
        btn.textContent = 'Création…';
        err.classList.add('hidden');

        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email:    document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            })
        });

        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            window.location.href = '/dashboard';
        } else {
            err.textContent = data.error || 'Erreur lors de l\'inscription';
            err.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
        }
    }

    // Rediriger si déjà connecté
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard';
    }
</script>

</body>
</html>
